version: "1.0"

paths:
  gadm_gpkg: "data/raw/using/gadm/gadm_410-levels.gpkg"
  gdp_csv: "data/raw/using/socioeconomic/API_NY.GDP.MKTP.CD_DS2_en_csv_v2_155.csv"
  output_root: "reproduction_v6/02_processed_data/gadm_processed_v1"
  analysis_doc: "data/raw/using/gadm/gadm_410_levels_litpop_applicability_analysis.md"
  litpop_doc: "reproduction_v6/08_References/litpop/litpop.md"

years:
  start: 2000
  end: 2024

mapping:
  disputed_to_parent:
    Z01: IND
    Z02: CHN
    Z03: CHN
    Z04: IND
    Z05: IND
    Z06: PAK
    Z07: IND
    Z08: CHN
    Z09: IND

runtime:
  overwrite: false
  gdal_rasterize_bin: "gdal_rasterize"
  raster:
    crs: "EPSG:4326"
    resolution_deg: 0.008333333333333333
    lon_min: -180.0
    lon_max: 180.0
    lat_min: -90.0
    lat_max: 90.0
    width: 43200
    height: 21600
    nodata: 0
    dtype: "int32"
    compression: "LZW"
    tiled: true
    blockxsize: 512
    blockysize: 512
    bigtiff: "YES"
